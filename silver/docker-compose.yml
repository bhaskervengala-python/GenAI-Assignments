version: "3.9"

services:
  study-buddy:
    build: .
    container_name: smart-study-buddy
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped

    # Ensures DB folder exists before app starts
    command: >
      sh -c "mkdir -p data uploads &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

networks:
  default:
    name: study-buddy-network